chat-bot-tier-set:     "{prefix}<#0079FF>{name}</#0079FF><gray>'ꜱ ᴀᴄᴛɪᴠɪᴛʏ ᴛɪᴇʀ ꜱᴇᴛ ᴛᴏ <white>{tier}<gray>."
chat-bot-tier-reset:   "{prefix}<#0079FF>{name}</#0079FF><gray>'ꜱ ᴀᴄᴛɪᴠɪᴛʏ ᴛɪᴇʀ ʀᴇꜱᴇᴛ ᴛᴏ <white>ʀᴀɴᴅᴏᴍ<gray>."
