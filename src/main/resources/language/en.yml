# ─────────────────────────────────────────────────────────────────────────────
#  ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ  ·  language/en.yml
#  Edit freely and run /fpp reload to apply changes without restarting.
#
#  Colour format: MiniMessage tags
#    Named    : <red>, <gray>, <white>, <dark_gray>, <yellow> …
#    Hex      : <#0079FF>text</#0079FF>
#    Style    : <bold>, <italic>, <underlined>, <strikethrough>
#    Reset    : <reset>
#  Placeholders: {placeholder} — see each section for available ones
#
#  ⚠  Keys marked "INTERNAL" are used by the layout engine.
#     You may adjust colours/characters but keep the key names intact.
# ─────────────────────────────────────────────────────────────────────────────

# ── Plugin prefix — prepended to all [FPP] messages ──────────────────────────
#  Feel free to change the colour/text, but keep it short.
prefix: "<dark_gray>[<#0079FF>ꜰᴘᴘ</#0079FF><dark_gray>]<reset> "


# ═════════════════════════════════════════════════════════════════════════════
#  1 · INTERNAL LAYOUT  —  do not remove or rename these keys
#  You may adjust colours/characters but keep the structure intact.
# ═════════════════════════════════════════════════════════════════════════════

# Horizontal rule used in headers and footers
divider: "<dark_gray><st>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</st>"

# Help menu  (placeholders {cmd}, {args}, {desc} required)
help-header: "<dark_gray><st>━━━━━━━━━</st> <#0079FF><bold>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ</#0079FF> <dark_gray><st>━━━━━━━━━</st>"
help-entry:  "  <#0079FF>/{cmd}</#0079FF><gray> {args} <dark_gray>— <white>{desc}"
help-footer: "<dark_gray><st>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</st>"

# Plugin info screen (/fpp bare) — header line
info-screen-header: "  <#0079FF><bold>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ</#0079FF> <dark_gray>· <gray>ꜰᴘᴘ"


# ═════════════════════════════════════════════════════════════════════════════
#  2 · GENERIC ERRORS
# ═════════════════════════════════════════════════════════════════════════════

# {0} — the root command name (e.g. "fpp")
no-permission:  "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴘᴇʀᴍɪꜱꜱɪᴏɴ ᴛᴏ ᴅᴏ ᴛʜɪꜱ."
unknown-command: "{prefix}<red>ᴜɴᴋɴᴏᴡɴ ꜱᴜʙ-ᴄᴏᴍᴍᴀɴᴅ. <gray>ᴛʀʏ <#0079FF>/{0} ʜᴇʟᴘ</#0079FF><gray> ꜰᴏʀ ᴀ ʟɪꜱᴛ."
player-only:    "{prefix}<red>ᴏɴʟʏ ᴀ ᴘʟᴀʏᴇʀ ᴄᴀɴ ʀᴜɴ ᴛʜɪꜱ ᴄᴏᴍᴍᴀɴᴅ."
invalid-number: "{prefix}<red>ɪɴᴠᴀʟɪᴅ ɴᴜᴍʙᴇʀ. ᴘʟᴇᴀꜱᴇ ᴇɴᴛᴇʀ ᴀ ᴘᴏꜱɪᴛɪᴠᴇ ɪɴᴛᴇɢᴇʀ."


# ═════════════════════════════════════════════════════════════════════════════
#  3 · SPAWNING
# ═════════════════════════════════════════════════════════════════════════════

# ── Spawn results ──────────────────────────────────────────────────────────────
# {count} — bots spawned  |  {total} — total active  |  {name} — bot name
# {max}   — global cap    |  {limit} — personal limit
spawn-success:            "{prefix}<#0079FF>{count}</#0079FF> <gray>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ(ꜱ) <white>ꜱᴜᴍᴍᴏɴᴇᴅ<gray>. <dark_gray>(<#0079FF>{total}</#0079FF> <gray>ᴀᴄᴛɪᴠᴇ<dark_gray>)"
spawn-max-reached:        "{prefix}<red>ᴍᴀx ʙᴏᴛ ʟɪᴍɪᴛ ʀᴇᴀᴄʜᴇᴅ <dark_gray>(<#0079FF>{max}</#0079FF> <gray>ʙᴏᴛꜱ<dark_gray>)<red>. ᴅᴇʟᴇᴛᴇ ꜱᴏᴍᴇ ꜰɪʀꜱᴛ."
spawn-user-limit-reached: "{prefix}<red>ʏᴏᴜ'ᴠᴇ ʀᴇᴀᴄʜᴇᴅ ʏᴏᴜʀ ᴘᴇʀꜱᴏɴᴀʟ ʙᴏᴛ ʟɪᴍɪᴛ <dark_gray>(<#0079FF>{limit}</#0079FF> <gray>ʙᴏᴛ(ꜱ)<dark_gray>)<red>."
spawn-invalid:            "{prefix}<red>ɪɴᴠᴀʟɪᴅ ᴜꜱᴀɢᴇ. <gray>ᴛʀʏ <#0079FF>/fpp spawn [afk|pvp] [amount] [--name <name>]</#0079FF><gray>."
spawn-invalid-name:       "{prefix}<red>ɪɴᴠᴀʟɪᴅ ʙᴏᴛ ɴᴀᴍᴇ. <gray>ᴜꜱᴇ <white>1–16 <gray>ᴄʜᴀʀꜱ <dark_gray>(<white>ʟᴇᴛᴛᴇʀꜱ<gray>, <white>ᴅɪɡɪᴛꜱ<gray>, <white>_<dark_gray>)<gray>."
spawn-name-taken:         "{prefix}<red>ᴀ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name} <red>ɪꜱ ᴀʟʀᴇᴀᴅʏ ᴀᴄᴛɪᴠᴇ."
spawn-no-names-left:      "{prefix}<red>ᴀʟʟ ɴᴀᴍᴇꜱ ɪɴ ᴛʜᴇ ᴘᴏᴏʟ ᴀʀᴇ ɪɴ ᴜꜱᴇ. <gray>ʀᴇᴅᴜᴄᴇ ᴀᴄᴛɪᴠᴇ ʙᴏᴛꜱ ᴏʀ ᴀᴅᴅ ᴍᴏʀᴇ ɴᴀᴍᴇꜱ."

# ── Console / location errors ──────────────────────────────────────────────────
# {world} — the world name that was not found
spawn-console-no-world:   "{prefix}<red>ɴᴏ ᴡᴏʀʟᴅ ɪꜱ ʟᴏᴀᴅᴇᴅ — ᴄᴀɴɴᴏᴛ ᴅᴇᴛᴇʀᴍɪɴᴇ ᴀ ꜱᴘᴀᴡɴ ʟᴏᴄᴀᴛɪᴏɴ."
spawn-world-not-found:    "{prefix}<red>ᴡᴏʀʟᴅ '<white>{world}<red>' ᴅᴏᴇꜱ ɴᴏᴛ ᴇxɪꜱᴛ ᴏʀ ɪꜱ ɴᴏᴛ ʟᴏᴀᴅᴇᴅ."
spawn-invalid-coords:     "{prefix}<red>ɪɴᴠᴀʟɪᴅ ᴄᴏᴏʀᴅɪɴᴀᴛᴇꜱ. <gray>ᴜꜱᴇ ꜰᴏʀᴍᴀᴛ: <white>x,y,z <gray><dark_gray>(ᴇ.ɢ. <white>100,64,200<gray>)"

# ── PVP bot ─────────────────────────────────────────────────────────────────
# {bot}    — number of bots  |  {player} — target player name
pvp-bot-target-set: "{prefix}<#0079FF>{bot}</#0079FF> <gray>ᴘᴠᴘ ʙᴏᴛ(ꜱ) ᴡɪʟʟ <red>ʜᴜɴᴛ <white>{player}<gray>."
player-not-found:   "{prefix}<red>ᴘʟᴀʏᴇʀ <white>{player} <red>ɪꜱ ɴᴏᴛ ᴏɴʟɪɴᴇ."

# ── Spawn cooldown ─────────────────────────────────────────────────────────────
# {seconds} — seconds remaining
spawn-cooldown: "{prefix}<red>ᴘʟᴇᴀꜱᴇ ᴡᴀɪᴛ <white>{seconds}s<red> ʙᴇꜰᴏʀᴇ ꜱᴘᴀᴡɴɪɴɢ ᴀɡᴀɪɴ."


# ═════════════════════════════════════════════════════════════════════════════
#  4 · DELETE
# ═════════════════════════════════════════════════════════════════════════════

# {name}  — bot name  |  {count} — bots deleted
delete-success:        "{prefix}<#0079FF>{name}</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ᴅɪꜱᴄᴏɴɴᴇᴄᴛᴇᴅ<gray>."
delete-all:            "{prefix}<#0079FF>{count}</#0079FF> <gray>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ(ꜱ) <white>ᴅɪꜱᴄᴏɴɴᴇᴄᴛᴇᴅ<gray>."
delete-none:           "{prefix}<red>ɴᴏ ʙᴏᴛꜱ ᴀʀᴇ ᴄᴜʀʀᴇɴᴛʟʏ ᴀᴄᴛɪᴠᴇ."
delete-not-found:      "{prefix}<red>ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red> ᴡᴀꜱ ꜰᴏᴜɴᴅ."
# {count} — number of bots randomly despawned
delete-random-success: "{prefix}<#0079FF>{count}</#0079FF> <gray>ʀᴀɴᴅᴏᴍ ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ(ꜱ) <white>ᴅɪꜱᴄᴏɴɴᴇᴄᴛᴇᴅ<gray>."


# ═════════════════════════════════════════════════════════════════════════════
#  5 · LIST
