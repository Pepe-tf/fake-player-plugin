# ─────────────────────────────────────────────────────────────────────────────
#  ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ  ·  config.yml  ·  v1.1.4
#  Run /fpp reload to apply changes without restarting the server.
#  Colors use MiniMessage syntax: <#0079FF>text</#0079FF>  <gray>text</gray>
# ─────────────────────────────────────────────────────────────────────────────

# ── Language ──────────────────────────────────────────────────────────────────
language: en

# ── Debug ─────────────────────────────────────────────────────────────────────
debug: false

# ── Update Checker ────────────────────────────────────────────────────────────
# Check GitHub for a newer version on startup and /fpp reload.
update-checker:
  enabled: true

# ─────────────────────────────────────────────────────────────────────────────
#  BOT LIMITS
# ─────────────────────────────────────────────────────────────────────────────
limits:
  max-bots: 1000          # 0 = unlimited
  user-bot-limit: 1       # default limit for fpp.user.spawn users
  spawn-presets: [1, 5, 10, 15, 20]

# ─────────────────────────────────────────────────────────────────────────────
#  BOT NAMES
#  {bot_name} = bot name   {spawner} = spawner name   {num} = bot number
# ─────────────────────────────────────────────────────────────────────────────
bot-name:
  admin-format: '{bot_name}'
  user-format: 'bot-{spawner}-{num}'

# ─────────────────────────────────────────────────────────────────────────────
#  LUCKPERMS INTEGRATION
# ─────────────────────────────────────────────────────────────────────────────
luckperms:
  use-prefix: true

# ─────────────────────────────────────────────────────────────────────────────
#  SKIN
#
#  mode: auto   — Bot gets the Mojang skin matching its name automatically.
#                 "Notch" → Notch's skin. Works on online-mode servers.
#                 This is the recommended setting.
#
#  mode: off    — No skin. All bots use the default Steve appearance.
#
#  mode: custom — Advanced skin control. Uses overrides, pool, and skin folder.
# ─────────────────────────────────────────────────────────────────────────────
skin:
  mode: auto   # auto | off | custom

  # (custom only) Per-bot skin overrides. bot-name: minecraft-username-to-copy
  overrides: {}
  # Examples:
  #   Herobrine: Notch
  #   CoolBot: Technoblade

  # (custom only) Random skin pool — list of Minecraft usernames.
  # Bots without an override get a random skin from this list.
  pool: []
  # Examples:
  #   - Notch
  #   - Dream
  #   - Technoblade

  # (custom only) Also use PNG files from plugins/FakePlayerPlugin/skins/.
  # <botname>.png = exact match. Any other .png = random pool.
  use-skin-folder: true

  # Clear skin cache on /fpp reload.
  clear-cache-on-reload: true

# ─────────────────────────────────────────────────────────────────────────────
#  BOT BODY
# ─────────────────────────────────────────────────────────────────────────────
body:
  enabled: true   # false = tab list / messages only, no visible entity

# ─────────────────────────────────────────────────────────────────────────────
#  PERSISTENCE  —  Bots rejoin at their last location after a server restart.
# ─────────────────────────────────────────────────────────────────────────────
persistence:
  enabled: true

# ─────────────────────────────────────────────────────────────────────────────
#  JOIN / LEAVE TIMING  (ticks — 20 ticks = 1 second)
# ─────────────────────────────────────────────────────────────────────────────
join-delay:
  min: 0
  max: 5

leave-delay:
  min: 0
  max: 5

# ─────────────────────────────────────────────────────────────────────────────
#  MESSAGES
# ─────────────────────────────────────────────────────────────────────────────
messages:
  join-message: true
  leave-message: true
  kill-message: false

# ─────────────────────────────────────────────────────────────────────────────
#  COMBAT
# ─────────────────────────────────────────────────────────────────────────────
combat:
  max-health: 20.0
  hurt-sound: true

# ─────────────────────────────────────────────────────────────────────────────
#  DEATH & RESPAWN
# ─────────────────────────────────────────────────────────────────────────────
death:
  respawn-on-death: false
  respawn-delay: 60        # ticks
  suppress-drops: true

# ─────────────────────────────────────────────────────────────────────────────
#  CHUNK LOADING
#
#  Bots keep chunks loaded around them exactly like a real player — mobs spawn,
#  redstone ticks, crops grow in the loaded area.
#
#  radius:          Chunk radius kept loaded around each bot.
#                   0 = match the server's simulation-distance automatically.
#                   Recommended: match your server's simulation-distance (default: 6).
#
#  update-interval: How often (in ticks) the loader checks if a bot has moved
#                   to a new chunk and updates tickets. 20 = once per second.
#                   Lower = more responsive to knockback; higher = less CPU.
# ─────────────────────────────────────────────────────────────────────────────
chunk-loading:
  enabled: true
  radius: 6           # 0 = auto (server simulation-distance)
  update-interval: 20 # ticks between chunk-ticket refreshes

# ─────────────────────────────────────────────────────────────────────────────
#  HEAD AI  —  Bots look at nearby players.
# ─────────────────────────────────────────────────────────────────────────────
head-ai:
  look-range: 8.0   # blocks; 0 = disabled
  turn-speed: 0.3   # 0.0 = frozen, 1.0 = instant snap

# ─────────────────────────────────────────────────────────────────────────────
#  COLLISION & PUSH
# ─────────────────────────────────────────────────────────────────────────────
collision:
  walk-radius: 0.85
  walk-strength: 0.22
  max-horizontal-speed: 0.30
  hit-strength: 0.45
  bot-radius: 0.90
  bot-strength: 0.14

# ─────────────────────────────────────────────────────────────────────────────
#  BOT SWAP / ROTATION
#  Bots periodically leave and rejoin with a new name to simulate turnover.
# ─────────────────────────────────────────────────────────────────────────────
swap:
  enabled: false
  session-min: 120         # seconds before a bot swaps out
  session-max: 600
  rejoin-delay-min: 5      # seconds between leave and rejoin
  rejoin-delay-max: 45
  jitter: 30               # random ± seconds added to session timer
  reconnect-chance: 0.15   # 0.0–1.0 chance to rejoin with the same name
  afk-kick-chance: 5       # % chance rejoin gap is extended 1–3 min
  farewell-chat: true
  greeting-chat: true
  time-of-day-bias: true   # longer sessions during peak hours

# ─────────────────────────────────────────────────────────────────────────────
#  FAKE CHAT  —  Bots send random messages from bot-messages.yml.
# ─────────────────────────────────────────────────────────────────────────────
fake-chat:
  enabled: false
  require-player-online: true
  chance: 0.75             # 0.0–1.0
  interval:
    min: 5                 # seconds
    max: 10

# ─────────────────────────────────────────────────────────────────────────────
#  DATABASE  —  Default: SQLite. Switch to MySQL for multi-server setups.
#
#  SQLite  — zero-config, stores data in plugins/FakePlayerPlugin/data/fpp.db
#  MySQL   — recommended for multi-server / BungeeCord setups
# ─────────────────────────────────────────────────────────────────────────────
database:
  # SQLite is used automatically when mysql-enabled is false.
  mysql-enabled: false

  mysql:
    host: "localhost"
    port: 3306
    database: "fpp"
    username: "root"
    password: ""
    use-ssl: false
    pool-size: 5
    connection-timeout: 30000

  # How often (in seconds) pending bot position updates are flushed to the DB.
  # Lower = more accurate restart positions; higher = less DB I/O.
  location-flush-interval: 30

  # Session history — controls how many rows are returned by /fpp info
  session-history:
    # Max rows returned per query (e.g. /fpp info spawner <name>)
    max-rows: 20

