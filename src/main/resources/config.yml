# ─────────────────────────────────────────────────────────────────────────────
#  ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ  ·  config.yml  ·  v1.2.7
#  Run /fpp reload to apply changes without restarting the server.
#  Colors use MiniMessage: <#0079FF>text</#0079FF>  <gray>text</gray>
# ─────────────────────────────────────────────────────────────────────────────

# Internal — managed by the migration system. Do NOT edit.
config-version: 14

language: en         # Language file to use (language/<lang>.yml)
debug: false         # Set true to enable verbose console logging

update-checker:
  enabled: true      # Check for new versions on startup and /fpp reload

# ─────────────────────────────────────────────────────────────────────────────
#  METRICS
#  Anonymous usage statistics sent to FastStats. Helps the developer understand
#  which features are used most. No personal data is ever collected.
#  Set false to opt out completely.
# ─────────────────────────────────────────────────────────────────────────────
metrics:
  enabled: true

# ─────────────────────────────────────────────────────────────────────────────
#  BOT LIMITS
# ─────────────────────────────────────────────────────────────────────────────
limits:
  max-bots: 1000           # Global cap across all spawners. 0 = unlimited.
  user-bot-limit: 1        # Default personal limit for fpp.user.spawn players.
  spawn-presets: [1, 5, 10, 15, 20]  # Tab-complete suggestions for /fpp spawn

# ─────────────────────────────────────────────────────────────────────────────
#  SPAWN COOLDOWN
#  How many seconds a player must wait between /fpp spawn commands.
#  0 = no cooldown. Admins with fpp.bypass.cooldown are always exempt.
# ─────────────────────────────────────────────────────────────────────────────
spawn-cooldown: 0

# ─────────────────────────────────────────────────────────────────────────────
#  BOT DISPLAY NAMES
#  Placeholders: {bot_name}  {spawner}  {num}
#  Colors: <#0079FF>{bot_name}</#0079FF>  or  <gray>{bot_name}</gray>
# ─────────────────────────────────────────────────────────────────────────────
bot-name:
  admin-format: '{bot_name}'             # /fpp spawn (admin)
  user-format:  'bot-{spawner}-{num}'   # /fpp spawn (user tier)

# ─────────────────────────────────────────────────────────────────────────────
#  LUCKPERMS
# ─────────────────────────────────────────────────────────────────────────────
luckperms:
  use-prefix: true   # Prepend the default-group prefix to every bot display name

# ─────────────────────────────────────────────────────────────────────────────
#  SKIN
#
#  mode: auto   — Mojang skin matching the bot's name. Best for online-mode.
#  mode: custom — Full control: per-bot overrides, pool, and skins/ folder.
#  mode: off    — No skin. All bots use default Steve / Alex appearance.
# ─────────────────────────────────────────────────────────────────────────────
skin:
  mode: auto

  # Bots always get SOME skin — never spawn as Steve. When the primary lookup
  # fails (generated name, user bot, rate-limit), this fallback chain runs:
  #   skins/ folder → pool → fallback-name skin fetched from Mojang
  guaranteed-skin: true
  fallback-name: Notch    # Real Minecraft account used as last-resort skin

  # ── custom mode only ──────────────────────────────────────────────────────
  overrides: {}           # Per-bot override: bot-name: minecraft-username
  # overrides:
  #   Herobrine: Notch
  #   CoolBot: Technoblade

  pool: []                # Random skin pool — list of Minecraft usernames
  # pool:
  #   - Notch
  #   - Dream
  #   - Technoblade

  use-skin-folder: true   # Scan plugins/FakePlayerPlugin/skins/ for PNG files
  clear-cache-on-reload: true

# ─────────────────────────────────────────────────────────────────────────────
#  BOT BODY
# ─────────────────────────────────────────────────────────────────────────────
body:
  enabled: true   # false = tab-list / server-count only, no visible entity

# ─────────────────────────────────────────────────────────────────────────────
#  PERSISTENCE
#  Bots leave on server shutdown and rejoin at their last position on restart.
# ─────────────────────────────────────────────────────────────────────────────
persistence:
  enabled: true

# ─────────────────────────────────────────────────────────────────────────────
#  JOIN / LEAVE TIMING  (ticks — 20 ticks = 1 second)
#  Each bot joins/leaves after a random delay in this range.
# ─────────────────────────────────────────────────────────────────────────────
join-delay:
  min: 0
  max: 5

leave-delay:
  min: 0
  max: 5

# ─────────────────────────────────────────────────────────────────────────────
#  MESSAGES
# ─────────────────────────────────────────────────────────────────────────────
messages:
  join-message: true    # "<Name> joined the game" — vanilla-style broadcast
  leave-message: true   # "<Name> left the game"
  kill-message: false   # Broadcast when a real player kills a bot

# ─────────────────────────────────────────────────────────────────────────────
#  COMBAT
# ─────────────────────────────────────────────────────────────────────────────
combat:
  max-health: 20.0   # Bot HP (20.0 = standard player health, 2 HP = 1 heart)
  hurt-sound: true   # Play the player hurt sound when a bot takes damage

# ─────────────────────────────────────────────────────────────────────────────
#  DEATH & RESPAWN
# ─────────────────────────────────────────────────────────────────────────────
death:
  respawn-on-death: false   # Respawn the bot after death instead of removing it
  respawn-delay: 60         # Ticks before respawn (60 = 3 seconds)
  suppress-drops: true      # Prevent bots from dropping items on death

# ─────────────────────────────────────────────────────────────────────────────
#  CHUNK LOADING
#  Bots keep surrounding chunks loaded exactly like a real player.
#  Mobs spawn, redstone ticks, crops grow inside the loaded radius.
# ─────────────────────────────────────────────────────────────────────────────
chunk-loading:
  enabled: true
  radius: 6            # Chunk radius kept loaded. 0 = match server simulation-distance.
  update-interval: 20  # Ticks between position checks (20 = 1 s). Lower = more responsive.

# ─────────────────────────────────────────────────────────────────────────────
#  HEAD AI
#  Bots smoothly rotate to look at the nearest player within range.
# ─────────────────────────────────────────────────────────────────────────────
head-ai:
  enabled: true
  look-range: 8.0   # Detection radius in blocks
  turn-speed: 0.3   # Rotation smoothing (0.0 = frozen, 1.0 = instant snap)

# ─────────────────────────────────────────────────────────────────────────────
#  COLLISION & PUSH  ·  Advanced — defaults work well for most servers.
#  Controls how hard players/hits push bots, and how bots separate from each other.
# ─────────────────────────────────────────────────────────────────────────────
collision:
  walk-radius: 0.85        # Radius in which walking into a bot pushes it
  walk-strength: 0.22      # Push force when walking into a bot
  hit-strength: 0.45       # Knockback force when hitting a bot
  bot-radius: 0.90         # Radius for bot-vs-bot separation
  bot-strength: 0.14       # Separation force between two bots
  max-horizontal-speed: 0.30  # Maximum push speed cap (all sources)

# ─────────────────────────────────────────────────────────────────────────────
#  BOT SWAP / ROTATION
#  Bots automatically leave and rejoin with a new name to simulate real turnover.
# ─────────────────────────────────────────────────────────────────────────────
swap:
  enabled: false
  session-min: 120   # Min seconds a bot stays online before swapping
  session-max: 600   # Max seconds

  # Advanced options — fine-tune realism (leave at defaults for most servers)
  rejoin-delay-min: 5      # Min seconds between leave and rejoin
  rejoin-delay-max: 45     # Max seconds
  jitter: 30               # ± seconds added randomly to session timer
  reconnect-chance: 0.15   # Chance (0.0–1.0) to rejoin with the same name
  afk-kick-chance: 5       # % chance the rejoin gap is extended (AFK-kick sim)
  farewell-chat: true      # Bot sends a farewell message before leaving
  greeting-chat: true      # Bot sends a greeting message after rejoining
  time-of-day-bias: true   # Longer sessions during peak hours

# ─────────────────────────────────────────────────────────────────────────────
#  FAKE CHAT
#  Bots send random messages from bot-messages.yml at random intervals.
# ─────────────────────────────────────────────────────────────────────────────
fake-chat:
  enabled: false
  require-player-online: true  # Only chat when at least one real player is online
  chance: 0.75                 # Probability (0.0–1.0) a message fires each interval
  interval:
    min: 5    # Seconds between messages (min)
    max: 10   # Seconds between messages (max)

# ─────────────────────────────────────────────────────────────────────────────
#  TAB LIST HEADER / FOOTER
#  Optional tab-list header and footer showing real vs fake player counts.
#  Placeholders: {bot_count}  {real_count}  {total_count}  {max_bots}
#  Colors use MiniMessage: <#0079FF>text</#0079FF>
# ─────────────────────────────────────────────────────────────────────────────
tab-list:
  enabled: false
  update-interval: 40   # Ticks between refreshes (40 = 2 s)
  header: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n<#0079FF><bold>ꜱᴇʀᴠᴇʀ ɴᴀᴍᴇ</#0079FF>\n<gray>Players: <white>{real_count} <dark_gray>+ <#0079FF>{bot_count} ʙᴏᴛꜱ\n<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  footer: "<dark_gray>ᴘᴏᴡᴇʀᴇᴅ ʙʏ <#0079FF>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ</#0079FF>"

# ─────────────────────────────────────────────────────────────────────────────
#  DATABASE
#  Records every bot session for auditing and in-game queries (/fpp info).
#  SQLite: zero-config — stored at plugins/FakePlayerPlugin/data/fpp.db
#  MySQL:  for multi-server / BungeeCord setups — set mysql-enabled: true
# ─────────────────────────────────────────────────────────────────────────────
database:
  mysql-enabled: false
  mysql:
    host: "localhost"
    port: 3306
    database: "fpp"
    username: "root"
    password: ""
    use-ssl: false
    pool-size: 5
    connection-timeout: 30000

  location-flush-interval: 30  # Seconds between position flushes to DB
  session-history:
    max-rows: 20               # Max rows returned per /fpp info query
