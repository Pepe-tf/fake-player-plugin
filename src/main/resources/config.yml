# ─────────────────────────────────────────────────────────────────────────────
#  ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ  ·  config.yml  ·  v0.1.5
#  Edit values below, then run /fpp reload to apply changes without restarting.
# ─────────────────────────────────────────────────────────────────────────────

# Language file to use (filename without .yml, must exist in the language/ folder)
language: en

# ── Debug ─────────────────────────────────────────────────────────────────────
debug:
  # Print verbose information to the console (useful for bug reports)
  enabled: false

# ── Fake Player ───────────────────────────────────────────────────────────────
fake-player:

  # Maximum number of fake players allowed on the server at once.
  # 0 = unlimited. Admins with fpp.bypass.maxbots ignore this cap.
  max-bots: 1000

  # Default personal bot limit for players with the fpp.user.spawn permission.
  # Override per-player with fpp.bot.<num> permission nodes (highest wins).
  # Admins with fpp.spawn ignore this completely.
  user-bot-limit: 1

  # Count presets shown in tab-complete when an admin types /fpp spawn.
  spawn-count-presets:
    admin: [ 1, 5, 10, 15, 20 ]

  # ── Skin ────────────────────────────────────────────────────────────────────
  skin:
    # How bots get their Minecraft player skin. Three modes:
    #
    #   auto     (recommended) — Calls Mannequin.setProfile(name). Paper and
    #              the Minecraft client resolve the correct Mojang skin for free.
    #              Requires online-mode server. Zero HTTP calls from the plugin.
    #
    #   fetch    — Plugin fetches the texture value + signature from the Mojang
    #              API in the background and injects it into the Mannequin.
    #              Works on offline-mode servers. Results are cached per session.
    #
    #   disabled — No skin applied. Bots display the default Steve / Alex skin.
    mode: auto

    # (fetch mode only) Clear the skin texture cache when /fpp reload is run.
    clear-cache-on-reload: true

  # ── Body ────────────────────────────────────────────────────────────────────
  # Spawn a physical Mannequin entity for each bot.
  # true  → bot is visible and pushable in the world
  # false → bot only appears in the tab list with join/leave messages (no entity)
  spawn-body: true

  # ── Persistence ─────────────────────────────────────────────────────────────
  # Save active bots on server shutdown and restore them on the next startup.
  # true  → bots leave on shutdown and rejoin automatically after restart
  # false → bots are removed permanently on shutdown
  persist-on-restart: true

  # ── Join Delay ──────────────────────────────────────────────────────────────
  # When spawning multiple bots, each one waits a random delay between min and
  # max ticks before appearing (20 ticks = 1 second). Set both to 0 for instant.
  join-delay:
    min: 0    # minimum ticks before a bot appears
    max: 5    # maximum ticks before a bot appears  (≈0.25 s)

  # ── Leave Delay ─────────────────────────────────────────────────────────────
  # When removing multiple bots (/fpp delete all), each one waits a random
  # delay before disconnecting, mimicking real players timing out.
  leave-delay:
    min: 0    # minimum ticks before a bot leaves
    max: 5    # maximum ticks before a bot leaves  (≈0.25 s)

  # ── Combat ──────────────────────────────────────────────────────────────────
  combat:
    # Health bots spawn with (default player health = 20.0)
    max-health: 20.0

    # Play the player hurt sound when a bot takes damage
    hurt-sound: true

  # ── Death & Respawn ─────────────────────────────────────────────────────────
  death:
    # true  → bot respawns at its last known location after dying
    # false → bot leaves the server permanently on death
    respawn-on-death: false

    # Delay in ticks before the bot respawns (20 ticks = 1 second)
    respawn-delay: 60

    # Suppress default mob drops when a bot dies
    suppress-drops: true

  # ── Messages ─────────────────────────────────────────────────────────────────
  messages:
    # Broadcast a vanilla-style join message when a bot is first spawned
    join-message: true

    # Broadcast a vanilla-style leave message when a bot is deleted or dies
    leave-message: true

    # Broadcast a kill message when a player kills a bot
    # e.g. "El_Pepes was slain by Steve"
    kill-message: false

  # ── Chunk Loading ───────────────────────────────────────────────────────────
  chunk-loading:
    # Keep chunks loaded around each bot exactly like a real player does.
    # Mobs spawn, redstone ticks, and crops grow in the surrounding area.
    enabled: true

    # Chunk radius to keep loaded around each bot.
    # Keep at or below your server's view-distance to avoid excess memory use.
    radius: 6

  # ── Head AI ──────────────────────────────────────────────────────────────────
  head-ai:
    # Radius (blocks) within which a bot rotates its head to face the nearest player.
    # Set to 0 to disable head tracking entirely.
    look-range: 8.0

    # Interpolation factor for head rotation (0.0–1.0).
    # 1.0 = instant snap to target | 0.1 = very slow, smooth turn
    turn-speed: 0.3

  # ── Collision / Push ─────────────────────────────────────────────────────────
  collision:
    # Distance (blocks) at which a player walking into a bot triggers a push
    walk-radius: 0.85

    # Impulse strength applied when a player walks into a bot
    walk-strength: 0.22

    # Maximum horizontal speed a bot can reach from any push source
    max-horizontal-speed: 0.30

    # Impulse strength when a player punches a bot
    hit-strength: 0.45

    # Radius (blocks) at which two overlapping bots push each other apart
    bot-radius: 0.90

    # Impulse strength for bot-vs-bot separation
    bot-strength: 0.14

  # ── Bot Swap / Rotation ──────────────────────────────────────────────────────
  # Bots automatically leave and rejoin with a new name after a random session,
  # creating organic join/leave activity without manual intervention.
  #
  #  Personality archetypes (randomly assigned per-bot):
  #    VISITOR (25%) — stays 30–60 % of the session range  (quick popper)
  #    REGULAR (50%) — stays 80–120 % of the session range (typical player)
  #    LURKER  (25%) — stays 150–250 % of the session range (long-term sitter)
  swap:
    # Master toggle — set to true to enable the swap/rotation system
    enabled: false

    # How long (seconds) a bot stays online before it swaps out.
    # Actual duration is further modified by personality, time-of-day, and jitter.
    session-min: 120   # 2 minutes
    session-max: 600   # 10 minutes

    # Gap (seconds) between a bot leaving and its replacement joining.
    rejoin-delay-min: 5
    rejoin-delay-max: 45

    # Extra randomness (±seconds) added to each bot's individual session timer.
    # Prevents all bots from swapping at the exact same moment.
    jitter: 30

    # Chance (0.0–1.0) that a rejoining bot keeps the SAME name instead of
    # getting a new one — simulates a brief disconnect / reconnect.
    reconnect-chance: 0.15

    # Percent chance (0–100) that a bot's rejoin gap is extended by 1–3 extra
    # minutes, simulating an AFK-kick by the server.
    afk-kick-chance: 5

    # Send a farewell chat message before the bot leaves ("gtg", "brb", etc.)
    # Requires fake-chat.enabled: true
    farewell-chat: true

    # Send a greeting chat message shortly after the replacement bot joins
    # ("hey", "back", "what did I miss?", etc.)
    # Requires fake-chat.enabled: true
    greeting-chat: true

    # Bias session lengths by the server's local time-of-day.
    # Peak hours  (18:00–22:00) → sessions up to 1.4× longer
    # Off-peak    (01:00–05:00) → sessions down to 0.5× shorter
    time-of-day-bias: true

# ── Fake Chat ─────────────────────────────────────────────────────────────────
# Bots randomly send chat messages to make the server feel alive.
# Messages are stored in bot-messages.yml — edit that file to change what bots say.
# Supports {name} and {random_player} placeholders.
fake-chat:
  # Master toggle — also controllable live with /fpp chat [on|off]
  enabled: false

  # Only chat when at least one real player is online
  require-player-online: true

  # Chance (0.0–1.0) that a message actually fires each scheduled interval.
  # Lower values make chat feel more sporadic and natural.
  chance: 0.75

  # Random interval between each bot's own messages (in seconds).
  # Each bot has its own independent timer.
  interval:
    min: 5    # minimum seconds between a bot's messages
    max: 10   # maximum seconds between a bot's messages

# ── Database ──────────────────────────────────────────────────────────────────
# FPP stores bot session data for auditing and analytics via /fpp info.
#
# Storage backends (in priority order):
#   1. MySQL  — configured below; ideal for multi-server / BungeeCord setups.
#   2. SQLite — automatic local fallback when MySQL is disabled or unreachable.
#              Data file: plugins/FakePlayerPlugin/data/fpp.db
database:
  mysql:
    # Set to true to use MySQL. If false (or unreachable), SQLite is used instead.
    enabled: false

    host:     "localhost"
    port:     3306
    database: "fpp"
    username: "root"
    password: ""
    use-ssl:  false

